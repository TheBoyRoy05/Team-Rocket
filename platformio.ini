; Regenerate IDE flags: pio run -t compiledb  -> compile_commands.json (gitignored)
[env:adafruit_feather_m0]
platform = atmelsam
board = adafruit_feather_m0
framework = arduino
; newlib-nano: enable snprintf/printf %f for CSV formatting in write-data.hpp
build_flags = -Wl,-u,_printf_float
lib_deps = 
    arduino-libraries/SD@^1.2.4
    arduino-libraries/RTCZero@^1.6.0
    adafruit/Adafruit BNO055@^1.6.4
    adafruit/Adafruit BMP3XX Library@^2.1.6
